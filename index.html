<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ただ穴に玉を入れるだけのゲーム</title>
  </head>
  <body>
    <div id="app">
      <div id="landscapeWarning">縦画面（ポートレート）でプレイしてください<br><br>※スマホの画面回転ロックをオンにすることをおすすめします</div>
      <!-- PixiJS Canvas Container -->
      <div id="gameContainer"></div>
      
      <div id="uiLayer">
        <!-- Tweakpane Container -->
        <div id="tunerContainer" style="position: absolute; top: 10px; right: 10px; z-index: 99999; pointer-events: auto;"></div>
        
        <div id="stageIndicator" style="display: none;">STAGE 1</div>
        
        <div id="titleScreen">
          <h1>ただ穴に<br>玉を入れる<br>だけのゲーム</h1>
          <button id="startButton">GAME START</button>
          <div id="guideText">スマホを水平にしてスタートしてください</div>
          <div id="versionDisplay" style="position: absolute; bottom: 5px; right: 10px; font-size: 12px; color: rgba(255,255,255,0.4); font-family: monospace; z-index: 100; pointer-events: none;"></div>
          <div id="installContainer" style="display: none; position: absolute; bottom: 40px;">
            <button id="installButton" style="padding: 12px 24px; font-size: 16px; font-weight: bold; background-color: #2980b9; color: white; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 0 15px rgba(41, 128, 185, 0.8); pointer-events: auto;">アプリをインストールする</button>
          </div>
        </div>
        
        <div id="statusMessage" style="display: none;">STAGE CLEAR!</div>
        
        <div id="endingScreen" style="display: none;">
          <div class="credits-roll">
            <h1>CONGRATULATIONS!</h1>
            <h2>全10ステージクリア！</h2>
            <br><br><br>
            <h3>【 制作者 】</h3>
            <p>俺 : 5%</p>
            <p>Google Antigravity : 95%</p>
            <br><br><br>
            <h3>【 スペシャルサンクス 】</h3>
            <p>テストプレイしてくれたデバッガー班</p>
            <br><br><br><br>
            <h2>Thank you for playing!</h2>
          </div>
          <button id="restartButton" style="display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);">最初から遊ぶ</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
